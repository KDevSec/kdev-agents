# kdev-memory git 托管配置 (Q-009)
# 记忆仓 = 独立 nested repo（私有，含 verbatim 用户原话）。代码仓 .gitignore 忽略 /.kdev/；
# 本文件 tracked，随 clone 到任何机器，SessionStart hook 据此自动 clone/pull（换机不丢记忆）。
# ⚠️ 用 SSH（不是 HTTPS）：无人值守的 SessionEnd hook push 靠 SSH key 非交互认证；HTTPS 需
# credential.helper 且 GIT_TERMINAL_PROMPT=0 下无法弹窗取凭据 → push 会静默失败、备份长期落后
# 而不自知（2026-07-01 实测积压 45 会话）。代码仓也用 SSH，一致。
memory_repo: git@github.com:KDevSec/kdev-agents-memory.git
branch: main
# sync: off —— 项目级「不建记忆仓 / 不同步」永久静默开关（缺省 on）。
# 把下面这行取消注释并**提交到本项目仓**后，全队 SessionStart 据此静默跳过：不建仓、不联网、不提示。
# 想重新启用：删掉该行（或改回 on）即可。
# sync: off
