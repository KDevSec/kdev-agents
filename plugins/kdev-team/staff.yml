# kdev-team 花名册：canonical id → 中文 display + flow-skill 方法论 + 编排 node-table + 运行时模型
# 守 spec §0.5 命名规范。运行时模型阶段1 暂统一 opus，可改二档。
# callee 员工（kind: callee，如 reviewer）= 被 caller 编排发函调用、不 own flow（不复用 kdev-flow-driver、
#   不持有 flow-state）、只产评分表回函；跨员工发函硬规（who→whom/结构化/建议非拦截）见 kdev-flow-driver SKILL §2.4quater。
employees:
  dev-engineer:
    display: 开发工程师
    kind: flow-owner
    flow_skill: kdev-coding-flow          # 方法论参考（非编排器）
    node_table: orchestration/dev-engineer.node-table.yml
    runtime_model: opus
    agents:
      - dev-engineer-orchestrator
      - dev-engineer-env
      - dev-engineer-plan
      - dev-engineer-frontend
      - dev-engineer-e2e
      - dev-engineer-deploy
      - dev-engineer-sec
  req-architect:
    display: 需求架构师
    kind: flow-owner
    flow_skill: kdev-design-flow          # 方法论参考（非编排器）
    node_table: orchestration/req-architect.node-table.yml
    runtime_model: opus
    agents:
      - req-architect-orchestrator
      - req-architect-clarify
      - req-architect-spec
      - req-architect-decompose
      - req-architect-prototype
      - req-architect-design
  test-engineer:
    display: 测试工程师
    kind: flow-owner
    flow_skill: null                 # 方法论分散在 kdev-test-points/cases/ui-autotest 能力 skill，无统一 flow-skill
    node_tables:                     # 多 flow flow-owner：2 个 relay flow（同 slug 接力 baton）。dev/req 仍用 node_table 单数
      test-design-flow: orchestration/test-engineer.design.node-table.yml
      test-exec-flow:   orchestration/test-engineer.exec.node-table.yml
    default_flow: test-design-flow   # driver 默认入口（黑盒设计，无 env、永远可跑）
    runtime_model: opus
    agents:
      - test-engineer-orchestrator
      - test-engineer-points
      - test-engineer-cases
      - test-engineer-ui
  reviewer:
    display: 评审专家
    kind: callee                              # 被 caller R3 review gate 发函调用，无自有 flow
    flow_skill: null                          # callee 无方法论 flow-skill
    dispatch_table: orchestration/reviewer.dispatch-table.yml   # 取代 node_table（互斥）
    standards_dir: standards/reviewer/
    runtime_model: opus
    agents:
      - reviewer-orchestrator
      - reviewer-sr
      - reviewer-story
      - reviewer-prototype
      - reviewer-design
      - reviewer-code
      - reviewer-security
      - reviewer-test-design
      - reviewer-test-coverage
